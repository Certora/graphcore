name: "Setup"
description: "Checkout, install uv, sync deps"
runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v4
    - uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"
    - run: uv sync --group test --group ci
      shell: bash