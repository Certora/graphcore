on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main

env:
  AWS_REGION: "us-west-2"

permissions:
  id-token: write
  contents: write
  actions: write
  pull-requests: write
  statuses: write

jobs:
  build_package:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.build_package.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
      - id: build_package
        run: |
          uv build
          ls -1 dist/
          echo "VERSION=$(uvx dunamai from git)" >> $GITHUB_OUTPUT
      - uses: actions/upload-artifact@v5
        with:
          name: graphcore-build
          path: dist/
          if-no-files-found: error

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --group test --group ci
      - run: uv run pytest tests/

  codeartifact_pypi_upload:
    name: AWS CodeArtifacts PyPI Upload
    runs-on: ubuntu-latest
    needs: [tests, build_package]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
      - uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: actions/download-artifact@v4
        with:
          name: graphcore-build
          path: dist/
      - name: Upload package
        run: |
          export TWINE_USERNAME=aws
          export TWINE_PASSWORD="$(aws codeartifact get-authorization-token --domain certora --domain-owner 092457480553 --region us-west-2 --query authorizationToken --output text)"
          export TWINE_REPOSITORY_URL="$(aws codeartifact get-repository-endpoint --domain certora --domain-owner 092457480553 --region us-west-2 --repository Certora-Internal --format pypi --query repositoryEndpoint --output text)"
          uvx twine upload --verbose --repository codeartifact dist/*.whl dist/*.tar.gz
      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
